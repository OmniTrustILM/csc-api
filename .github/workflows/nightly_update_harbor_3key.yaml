name: Nightly update 3Key Harbor image

on:
  schedule:
    - cron: "0 1 * * *"
  workflow_dispatch:

env:
  REGISTRY: harbor.3key.company
  REGISTRY_USERNAME: ${{ secrets.HARBOR_3KEY_USERNAME }}
  REGISTRY_PASSWORD: ${{ secrets.HARBOR_3KEY_PASSWORD }}
  REGISTRY_PROVIDER: harbor2
  IMAGE: harbor.3key.company/czertainly-signing/czertainly-csc-api
  DOCKERFILE: ./Dockerfile
  CACHE_SCOPE: czertainly-csc-api-nightly

concurrency:
  group: nightly-${{ github.ref }}
  cancel-in-progress: true

jobs:
  resolve_tag:
    name: Resolve latest tag
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.latest.outputs.tag }}
      major: ${{ steps.semver.outputs.major }}
      minor: ${{ steps.semver.outputs.minor }}
    steps:
      - name: Check out the repo
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Get latest tag
        id: latest
        run: |
          git fetch --tags
          TAG=$(git describe --tags "$(git rev-list --tags --max-count=1)")
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Compute major/minor tags
        id: semver
        run: |
          FULL=${{ steps.latest.outputs.tag }}
          MAJOR=${FULL%%.*}
          MINOR=${FULL%.*}
          echo "major=${MAJOR}" >> "$GITHUB_OUTPUT"
          echo "minor=${MINOR}" >> "$GITHUB_OUTPUT"

  build_amd64:
    name: Build amd64
    runs-on: ubuntu-latest
    needs: resolve_tag
    outputs:
      digest: ${{ steps.build.outputs.digest }}
    steps:
      - name: Check out the repo
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ needs.resolve_tag.outputs.tag }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ env.REGISTRY_USERNAME }}
          password: ${{ env.REGISTRY_PASSWORD }}

      - name: Build + push (amd64) by digest only
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ env.DOCKERFILE }}
          platforms: linux/amd64
          provenance: mode=max
          sbom: true
          outputs: type=image,name=${{ env.IMAGE }},push-by-digest=true,name-canonical=true,push=true
          cache-from: type=gha,scope=${{ env.CACHE_SCOPE }}-amd64
          cache-to: type=gha,mode=max,scope=${{ env.CACHE_SCOPE }}-amd64

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # 0.35.0
        env:
          TRIVY_IMAGE_SRC: remote
          TRIVY_PLATFORM: linux/amd64
        with:
          image-ref: ${{ env.IMAGE }}@${{ steps.build.outputs.digest }}
          format: json
          output: trivy-report-amd64.json
          exit-code: 0

      - name: Upload vulnerability report
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: trivy-report-amd64
          path: trivy-report-amd64.json

      - name: Fail build on vulnerabilities
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # 0.35.0
        env:
          TRIVY_IMAGE_SRC: remote
          TRIVY_PLATFORM: linux/amd64
        with:
          image-ref: ${{ env.IMAGE }}@${{ steps.build.outputs.digest }}
          trivy-config: config/trivy.yaml
          skip-setup-trivy: true

  build_arm64:
    name: Build arm64
    runs-on: ubuntu-24.04-arm
    needs: resolve_tag
    outputs:
      digest: ${{ steps.build.outputs.digest }}
    steps:
      - name: Check out the repo
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ needs.resolve_tag.outputs.tag }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ env.REGISTRY_USERNAME }}
          password: ${{ env.REGISTRY_PASSWORD }}

      - name: Build + push (arm64) by digest only
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ env.DOCKERFILE }}
          platforms: linux/arm64
          provenance: mode=max
          sbom: true
          outputs: type=image,name=${{ env.IMAGE }},push-by-digest=true,name-canonical=true,push=true
          cache-from: type=gha,scope=${{ env.CACHE_SCOPE }}-arm64
          cache-to: type=gha,mode=max,scope=${{ env.CACHE_SCOPE }}-arm64

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # 0.35.0
        env:
          TRIVY_IMAGE_SRC: remote
          TRIVY_PLATFORM: linux/arm64
        with:
          image-ref: ${{ env.IMAGE }}@${{ steps.build.outputs.digest }}
          format: json
          output: trivy-report-arm64.json
          exit-code: 0

      - name: Upload vulnerability report
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: trivy-report-arm64
          path: trivy-report-arm64.json

      - name: Fail build on vulnerabilities
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # 0.35.0
        env:
          TRIVY_IMAGE_SRC: remote
          TRIVY_PLATFORM: linux/arm64
        with:
          image-ref: ${{ env.IMAGE }}@${{ steps.build.outputs.digest }}
          trivy-config: config/trivy.yaml
          skip-setup-trivy: true

  publish_manifest:
    name: Publish multiarch manifest
    runs-on: ubuntu-latest
    needs: [resolve_tag, build_amd64, build_arm64]
    steps:
      - name: Check out the repo
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ needs.resolve_tag.outputs.tag }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=schedule,pattern=nightly
            type=raw,value=latest
            type=raw,value=${{ needs.resolve_tag.outputs.minor }}
            type=raw,value=${{ needs.resolve_tag.outputs.major }}
            type=schedule,pattern={{date 'YYYYMMDD'}},priority=900
            type=sha

      - name: Log in to registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ env.REGISTRY_USERNAME }}
          password: ${{ env.REGISTRY_PASSWORD }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Install Cosign
        uses: sigstore/cosign-installer@v4.0.0

      - name: Create + push multiarch manifests (all tags)
        env:
          TAGS: ${{ steps.meta.outputs.tags }}
          COSIGN_PRIVATE_KEY: ${{ secrets.COSIGN_PRIVATE_KEY }}
          COSIGN_PASSWORD: ${{ secrets.COSIGN_PASSWORD }}
        run: |
          set -euo pipefail

          AMD_DIGEST="${{ needs.build_amd64.outputs.digest }}"
          ARM_DIGEST="${{ needs.build_arm64.outputs.digest }}"

          echo "amd64 digest: ${AMD_DIGEST}"
          echo "arm64 digest: ${ARM_DIGEST}"

          echo "Signing per-arch images by digest"
          cosign sign --yes --key env://COSIGN_PRIVATE_KEY "${IMAGE}@${AMD_DIGEST}"
          cosign sign --yes --key env://COSIGN_PRIVATE_KEY "${IMAGE}@${ARM_DIGEST}"

          echo "Tags to publish:"
          echo "${TAGS}"

          while IFS= read -r tag; do
            [ -z "$tag" ] && continue
            echo "Publishing manifest: $tag"

            docker buildx imagetools create \
              --tag "$tag" \
              "${IMAGE}@${AMD_DIGEST}" \
              "${IMAGE}@${ARM_DIGEST}"

            docker buildx imagetools inspect "$tag"

            echo "Signing multiarch manifest tag: $tag"
            cosign sign --yes --key env://COSIGN_PRIVATE_KEY "$tag"
          done <<< "${TAGS}"

      - name: Push README to registry
        uses: christian-korneck/update-container-description-action@v1
        env:
          DOCKER_USER: ${{ env.REGISTRY_USERNAME }}
          DOCKER_PASS: ${{ env.REGISTRY_PASSWORD }}
        with:
          destination_container_repo: ${{ env.IMAGE }}
          provider: ${{ env.REGISTRY_PROVIDER }}
